<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <title>Setup - Select Control Panel</title>
    <style>
        :root { color-scheme: dark; }
        body {
            background-color: #000000 !important;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        .container {
            background: #121212;
            padding: 2rem 3rem;
            border-radius: 12px;
            border: 1px solid #27272a;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            min-width: 320px;
            z-index: 10;
        }
        h1 { margin: 0; font-size: 1.8rem; }
        h2 { margin: 0; color: #a0a0a0; font-weight: normal; font-size: 1.2rem; }
        
        .option {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2a2a2a;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .option:hover { background: #333; }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #007bff;
            cursor: pointer;
        }
        
        label { cursor: pointer; font-size: 1.1rem; user-select: none; }

        button {
            background-color: #333;
            color: #777;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: not-allowed;
            transition: all 0.2s;
            width: 100%;
            font-weight: bold;
        }
        
        button.active {
            background-color: #007bff;
            color: white;
            cursor: pointer;
        }
        button.active:hover { background-color: #0056b3; }
        button.active:active { transform: scale(0.98); }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: black;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #2a2a2a;
            border-top: 5px solid #007bff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <div style="font-weight: bold; letter-spacing: 2px; color: white;">INITIALIZING SYSTEM</div>
    </div>

    <div class="container">
        <div style="margin-bottom: 0.5rem; color: #84cc16; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Initial Configuration</div>
        <h1 style="font-size: 3rem; margin: 0; color: #fff;" id="screen-id-large">...</h1>
        <div style="background: #2a2a2a; padding: 0.5rem 1rem; border-radius: 20px; margin: 0.5rem 0;">
            <h2 id="screen-name" style="color: #fff; font-weight: bold;">Detecting...</h2>
        </div>
        <p style="color: #888; margin-top: -0.5rem; font-size: 0.9rem;">Choose if this monitor will be your primary control panel.</p>
        
        <button id="confirm-btn" class="active" onclick="saveConfig()">SELECT AS DASHBOARD</button>
        
        <div style="margin-top: 1rem; font-size: 0.8rem; color: #555;">
            Other monitors will automatically be used for projection.
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const screen = params.get('screen');
        const btn = document.getElementById('confirm-btn');
        const loader = document.getElementById('loader');

        if (screen) {
            document.getElementById('screen-name').textContent = "Monitor: " + screen;
            // Clean up name for display
            let displayName = screen.replace('Unknown-', 'Monitor ');
            document.getElementById('screen-id-large').textContent = displayName.split('-').pop();
        }

        let isRedirecting = false;

        function showLoader(text) {
            loader.style.display = 'flex';
            if (text) {
                loader.querySelector('div:last-child').textContent = text;
            }
        }

        async function saveConfig() {
            if (!screen || isRedirecting) return;
            
            console.log("[SETUP] User selected as dashboard: " + screen);
            isRedirecting = true;
            clearInterval(pollInterval); 
            showLoader("SAVING CONFIGURATION...");
            btn.textContent = "Saving...";
            btn.classList.remove('active');
            btn.disabled = true;

            try {
                console.log("[SETUP] Sending POST /api/config/monitor for screen: " + screen);
                const response = await fetch('/api/config/monitor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dashboard_screen_name: screen })
                });
                
                if (response.ok) {
                    console.log("[SETUP] Save successful. Redirecting to: /?screen=" + encodeURIComponent(screen));
                    showLoader("SYNCHRONIZING...");
                    setTimeout(() => {
                        window.location.href = "/?screen=" + encodeURIComponent(screen);
                    }, 800);
                } else {
                    const errorText = await response.text();
                    console.error("[SETUP] Save failed with status: " + response.status + " error: " + errorText);
                    isRedirecting = false;
                    loader.style.display = 'none';
                    throw new Error("Failed to save: " + errorText);
                }
            } catch (err) {
                console.error("[SETUP] Catch error during save: ", err);
                isRedirecting = false;
                loader.style.display = 'none';
                alert("Error saving config: " + err);
                btn.textContent = "SELECT AS DASHBOARD";
                btn.classList.add('active');
                btn.disabled = false;
            }
        }

        // Poll for changes from other screens
        const pollInterval = setInterval(async () => {
            if (isRedirecting) return;
            try {
                const res = await fetch('/api/config/monitor?t=' + Date.now());
                if (res.ok) {
                    const config = await res.json();
                    
                    if (config.dashboard_screen_name && config.dashboard_screen_name !== "" && config.dashboard_screen_name !== screen) {
                        console.log("[SETUP] Detected dashboard selection on another screen: '" + config.dashboard_screen_name + "'. (My screen is: '" + screen + "')");
                        isRedirecting = true;
                        showLoader("DASHBOARD SELECTED ON OTHER SCREEN: " + config.dashboard_screen_name);
                        clearInterval(pollInterval);
                        setTimeout(() => {
                            window.location.href = "/?screen=" + encodeURIComponent(screen);
                        }, 1500);
                    } else if (config.dashboard_screen_name === screen) {
                        console.log("[SETUP] This screen is now dashboard. Redirecting to app...");
                        isRedirecting = true;
                        showLoader("SYNCHRONIZING...");
                        clearInterval(pollInterval);
                        window.location.href = "/?screen=" + encodeURIComponent(screen);
                    }
                }
            } catch (e) {
                // console.warn("[SETUP] Poll failed: ", e);
            }
        }, 800);
    </script>
</body>
</html>
